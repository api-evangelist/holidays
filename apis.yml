aid: holidays
name: Holiday API
description: >-
  Holiday API is a commercial reference-data service that delivers verified public holidays, observances, country and
  language metadata, and workday calculations for 250 countries and 3,680+ state/province subdivisions in 100+
  languages. Operated by Gravity Boulevard, LLC, it exposes five JSON endpoints under https://holidayapi.com/v1/ with
  official client libraries for Go, Node.js, PHP, Python, Ruby, and Raku.
