naftiko: 1.0.0-alpha2
info:
  label: Holiday API — Workdays
  description: 'Holiday API — Workdays. 2 operations. Lead operation: Get Workday. Self-contained Naftiko capability for working/business day arithmetic honoring country workweeks and public holidays.'
  tags:
    - HolidayAPI
    - Workdays
    - Calendar
    - Business Days
  created: '2026-05-29'
  modified: '2026-05-29'
binds:
  - namespace: env
    keys:
      HOLIDAYAPI_KEY: HOLIDAYAPI_KEY
capability:
  consumes:
    - type: http
      namespace: holidays-workdays
      baseUri: https://holidayapi.com
      description: 'Holiday API — Workdays business capability.'
      resources:
        - name: workday
          path: /v1/workday
          operations:
            - name: getWorkday
              method: GET
              description: Calculate the workday that occurs a given number of days after a start date.
              inputParameters:
                - name: key
                  in: query
                  type: string
                  value: '{{env.HOLIDAYAPI_KEY}}'
                  required: true
                - name: country
                  in: query
                  type: string
                  required: true
                - name: start
                  in: query
                  type: string
                  required: true
                - name: days
                  in: query
                  type: integer
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
        - name: workdays
          path: /v1/workdays
          operations:
            - name: getWorkdays
              method: GET
              description: Calculate the number of workdays between two dates for a given country.
              inputParameters:
                - name: key
                  in: query
                  type: string
                  value: '{{env.HOLIDAYAPI_KEY}}'
                  required: true
                - name: country
                  in: query
                  type: string
                  required: true
                - name: start
                  in: query
                  type: string
                  required: true
                - name: end
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: $.
  exposes:
    - type: rest
      namespace: holidays-workdays-rest
      port: 8080
      description: REST adapter for Holiday API — Workdays.
      resources:
        - path: /v1/workday
          name: workday
          description: Single workday calculation.
          operations:
            - method: GET
              name: getWorkday
              description: Calculate workday offset from a start date.
              call: holidays-workdays.getWorkday
              outputParameters:
                - type: object
                  mapping: $.
        - path: /v1/workdays
          name: workdays
          description: Workday range counter.
          operations:
            - method: GET
              name: getWorkdays
              description: Count workdays between two dates.
              call: holidays-workdays.getWorkdays
              outputParameters:
                - type: object
                  mapping: $.
    - type: mcp
      namespace: holidays-workdays-mcp
      port: 9090
      transport: http
      description: MCP adapter for Holiday API — Workdays.
      tools:
        - name: get-workday
          description: Calculate a workday offset honoring country holidays.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: holidays-workdays.getWorkday
          outputParameters:
            - type: object
              mapping: $.
        - name: get-workdays
          description: Count workdays between two dates honoring country holidays.
          hints:
            readOnly: true
            destructive: false
            idempotent: true
          call: holidays-workdays.getWorkdays
          outputParameters:
            - type: object
              mapping: $.
