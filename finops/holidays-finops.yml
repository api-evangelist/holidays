meters:
  - name: subscription_fee
    description: Flat annual subscription per plan tier (Countries $249/year, States & Provinces $399/year).
    unit: year
    aggregation: max
    dimensions:
      - plan
  - name: monthly_requests
    description: Total successful + error requests against the shared monthly quota, regardless of endpoint.
    unit: request
    aggregation: sum
    dimensions:
      - api_key
      - endpoint
principles:
  - name: Visibility
    description: Every successful response includes a requests envelope (used / available / resets).
      Scrape the headers/envelope into your observability pipeline to track burn rate per API key.
  - name: Allocation
    description: Holiday API tracks usage at the API key level. Issue distinct keys per environment
      (dev, staging, production) and per integration to enable chargeback and isolate quota burn.
  - name: Optimization
    description: Cache aggressively. Holidays are deterministic per (country, year) and rarely change;
      the Countries and Languages endpoints change even less. Pre-fetch annual data on Jan 1 and
      serve from local cache to minimize quota use. The free plan permits a 24-hour offline window;
      paid plans permit unlimited offline storage during active subscription.
  - name: Accountability
    description: Failed (4xx) requests still consume quota except for auth errors during key creation.
      Monitor 4xx/5xx rate to avoid wasted quota. When approaching quota, switch reads to the
      offline cache rather than upgrading — there is no higher quota tier available; the cap is
      1,000,000 requests/month on all plans.
