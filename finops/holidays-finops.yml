description: >-
  FOCUS-aligned FinOps for Holiday API. The provider sells a flat annual subscription per tier
  (Countries $249/year, States & Provinces $399/year) with a single shared monthly request quota
  of 1,000,000 requests. There is no per-request charge and no overage billing — exceeding the
  monthly quota returns HTTP 429 until reset on the first of the next month at 00:00 UTC.
